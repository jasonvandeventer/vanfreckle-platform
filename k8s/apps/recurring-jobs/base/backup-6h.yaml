apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-6h
  namespace: longhorn-system
spec:
  name: backup-6h
  task: backup
  cron: "0 0/6 * * ?"
  retain: 28        # ~7 days of 6-hourly off-site backups on R2 (was 10 ≈ 2.5d)
  concurrency: 1
  groups:
    - default
    - test
  labels: {}
  parameters: {}
