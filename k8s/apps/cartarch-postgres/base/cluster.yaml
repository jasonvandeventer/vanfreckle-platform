# Repo path: k8s/apps/cartarch-postgres/base/cluster.yaml
#
# The cartarch PostgreSQL cluster, managed by CloudNativePG. This is the durable
# replacement for SQLite-on-Longhorn — CNPG runs streaming replication between
# instances (each on its own Longhorn PVC) and ships WALs + base backups to R2
# (Barman Cloud), giving crash-safe WAL durability + PITR. The recurring
# SQLite-on-Longhorn corruption class (unclean volume detach) does not apply:
# a standby promotes on primary loss, and PITR reconstructs from R2.
#
# CNPG auto-generates two secrets in this namespace:
#   - cartarch-pg-superuser  (postgres superuser)
#   - cartarch-pg-app        (the `cartarch` app role) — its `uri` key is a
#     ready-made postgresql://… DSN. The v4 app reads DATABASE_URL from it via
#     secretKeyRef (Workstream A); db.py rewrites the scheme to
#     postgresql+psycopg://. See docs/runbooks/cnpg-bring-up.md.
#
# Backups run through the Barman Cloud Plugin — the R2 destination/credentials/
# retention are in objectstore.yaml; this cluster references it via .spec.plugins.
# PREREQUISITES before first sync (see docs/runbooks/cnpg-bring-up.md):
#   - the barman-cloud-plugin App must be healthy (provides the plugin + sidecar).
#   - the cnpg-backup-r2 Secret must exist in THIS namespace (kubeseal step) or
#     WAL archiving / backups fail.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cartarch-pg
  namespace: cartarch
spec:
  instances: 2                     # 1 primary + 1 hot standby. DECISION POINT:
                                   # 3 enables quorum-based synchronous replication
                                   # (stronger HA across node2–4); 2 is the lean default.
  # Immutable dated build for GitOps determinism (rolling alt: 17-standard-bookworm).
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10-202606010953-standard-bookworm

  primaryUpdateStrategy: unsupervised   # homelab: let CNPG roll minor updates

  storage:
    storageClass: longhorn
    size: 10Gi                     # data is tiny (~1 user); headroom for the
                                   # rebuilt scryfall_cards cache (~150 MB today)
  walStorage:
    storageClass: longhorn
    size: 5Gi                      # separate WAL volume — standard CNPG practice

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Bootstrap a fresh, forward-named database + role. The v4 migration strategy
  # is "schema baseline" (Base.metadata.create_all on a fresh DB, seed
  # schema_migrations as all-applied) — see the v4 scope doc — so an empty
  # `cartarch` DB owned by the `cartarch` role is exactly the right start.
  bootstrap:
    initdb:
      database: cartarch
      owner: cartarch

  # Backups + continuous WAL archiving go through the Barman Cloud Plugin (the
  # in-tree .spec.backup.barmanObjectStore was removed at operator 1.26+). The
  # R2 destination, credentials, and retention live in the ObjectStore CR
  # (objectstore.yaml); this just wires the plugin to it. isWALArchiver: true
  # makes this plugin the cluster's WAL archiver.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cartarch-pg-store
