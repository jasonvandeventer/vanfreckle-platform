# Repo path: k8s/apps/cartarch-postgres/base/objectstore.yaml
#
# Barman Cloud Plugin ObjectStore — the R2 (S3-compatible) backup destination
# for the cartarch cluster. Replaces the removed in-tree
# .spec.backup.barmanObjectStore. The cluster references this by name via
# .spec.plugins[].parameters.barmanObjectName (see cluster.yaml); base backups
# and continuous WAL archiving both land here.
#
# Reuses the existing off-site R2 bucket `cartarch-backups` under a dedicated
# /cnpg prefix (Longhorn backups sit at the bucket root — no collision).
#
# Credentials: the `cnpg-backup-r2` Secret in THIS namespace (keys ACCESS_KEY_ID
# / SECRET_ACCESS_KEY), created via kubeseal — see docs/runbooks/cnpg-bring-up.md.
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: cartarch-pg-store
  namespace: cartarch
spec:
  retentionPolicy: "30d"            # format ^[1-9][0-9]*[dwm]$
  configuration:
    destinationPath: s3://cartarch-backups/cnpg
    endpointURL: https://99e379c3eabdfb70c6da73e35342de10.r2.cloudflarestorage.com
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-r2
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup-r2
        key: SECRET_ACCESS_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
