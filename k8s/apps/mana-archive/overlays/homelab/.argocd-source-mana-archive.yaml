# TEMPORARY PIN — CSRF incident 2026-05-31 (re-asserted).
# cartarch v3.31.0 introduced a CSRF regression ("Invalid CSRF token" on
# sign-in); v3.31.1 did not fix it. Rolled back to the last known-good tag,
# v3.30.23 (login worked across the entire v3.30.x line).
#
# This pin is being RE-asserted: the original rollback (commit fff4c67) was
# silently clobbered by argocd-image-updater (commit f084fc6, 16:54 UTC the
# same day), which re-bumped the tag back to the broken v3.31.1 and stripped
# this comment — because the updater-disable in the same rollback had not yet
# propagated to the running controller when its next cycle fired. As a result
# main pinned v3.31.1 and prod ran the broken build. Auto-updates are now
# confirmed disabled (k8s/argocd/image-updaters/mana-archive.yaml manages zero
# images), so this re-pin holds.
#
# Restore the updater + bump this tag once the app ships a fixed release
# (>= v3.31.2, cartarch PR #13) and sign-in is verified. To avoid another
# clobber: bump the tag and re-enable the updater in SEPARATE, confirmed-
# synced steps, not the same commit.
kustomize:
  images:
  - ghcr.io/jasonvandeventer/mana-archive=ghcr.io/jasonvandeventer/mana-archive:v3.30.23
