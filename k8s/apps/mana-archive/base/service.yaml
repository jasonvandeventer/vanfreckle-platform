apiVersion: v1
kind: Service
metadata:
  name: mana-archive
  namespace: mana-archive
  labels:
    app: mana-archive          # selectable by the ServiceMonitor (servicemonitor.yaml)
spec:
  selector:
    app: mana-archive
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
