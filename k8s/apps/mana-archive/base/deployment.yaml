apiVersion: apps/v1
kind: Deployment
metadata:
  name: mana-archive
  namespace: mana-archive
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mana-archive
  template:
    metadata:
      labels:
        app: mana-archive
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/jasonvandeventer/mana-archive:v3.4.3
          command:
            - python
            - /app/scripts/run_migrations.py
          env:
            - name: DATA_DIR
              value: /data
            - name: PYTHONPATH
              value: /app
          volumeMounts:
            - name: mana-archive-data
              mountPath: /data

      containers:
        - name: mana-archive
          image: ghcr.io/jasonvandeventer/mana-archive:v3.4.3
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_DIR
              value: /data
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mana-archive-secrets
                  key: SESSION_SECRET_KEY
            # v3.27.14 — Resend API key for outbound /forgot-password
            # emails. Wired from the same mana-archive-secrets Secret as
            # SESSION_SECRET_KEY; the key value itself is created
            # out-of-band via kubectl and never committed. The app's
            # startup check in app/main.py refuses to boot in production
            # without this set (DEV_MODE=true bypasses for local dev).
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mana-archive-secrets
                  key: RESEND_API_KEY
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: mana-archive-data
              mountPath: /data

      volumes:
        - name: mana-archive-data
          persistentVolumeClaim:
            claimName: mana-archive-data-longhorn
