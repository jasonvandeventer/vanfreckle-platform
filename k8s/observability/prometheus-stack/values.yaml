# Helm values for kube-prometheus-stack.
# Consumed by the `observability` ArgoCD Application via a $values multi-source ref.
# Repo path: k8s/observability/prometheus-stack/values.yaml
#
# The manually-installed release ran with NO values at all (`helm get values` -> null).
# This file deliberately sets only what was MISSING -- durable storage and a managed
# admin credential. Everything else stays at chart defaults; no added complexity.

prometheus:
  prometheusSpec:
    retention: 10d
    # Durable TSDB on Longhorn. The manual install used emptyDir, so metrics were
    # wiped on every pod restart (4x already). This is the actual latent fix --
    # without it, the redeploy would faithfully reproduce the original problem.
    #
    # Sizing: 8Gi is generous for 10d of 4-node metrics. The Longhorn capacity
    # wall that originally forced it small (40G VMs, ~34G usable) was resolved
    # 2026-05-28 (VM disks grown to 100G; ~195Gi free), so 8Gi can be grown
    # online whenever wanted.
    #
    # Replica count: this volume runs at the `longhorn` StorageClass default of
    # 3 replicas. A prior `longhorn.io/replica-count: "1"` PVC annotation was
    # removed 2026-05-29 -- it was a NO-OP. Longhorn reads replica count from the
    # StorageClass (`numberOfReplicas`) or the global default, NOT from a PVC
    # annotation, so the volume was always 3. 3 replicas of a re-scrapeable TSDB
    # is harmless now that capacity isn't scarce; to actually run fewer, point
    # this volumeClaimTemplate at a dedicated 1-replica StorageClass instead.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 8Gi

grafana:
  # Grafana runs on an ephemeral emptyDir DB by deliberate choice (2026-05-29).
  # Its grafana.db holds no irreplaceable state here: the admin login comes from
  # the grafana-admin-credentials Secret (below), and dashboards + datasources
  # are GitOps/sidecar-provisioned. The previous Longhorn PVC made the SQLite DB
  # vulnerable to the cluster's recurring SQLite-on-Longhorn corruption on
  # unclean restarts -- which is exactly what happened (DB "malformed", Grafana
  # CrashLoopBackOff after a ~14h-ago node2 reschedule). emptyDir rebuilds the DB
  # each start, making Grafana immune to that corruption class, and frees 5Gi on
  # the capacity-constrained Longhorn nodes. Same posture as Alertmanager below.
  persistence:
    enabled: false
  # Admin credential read from a cluster-side Secret that is NOT committed to Git.
  # Create it once (see docs/recovery.md); the password value never enters the repo.
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

alertmanager:
  # Storage stays chart-default emptyDir (persisted silences are low-value here).
  # Config below wires email alerting via Resend SMTP (2026-05-30) so the ~35
  # chart-default alerts actually page instead of firing into the void.
  alertmanagerSpec:
    # Mount the sealed Resend API key (k8s/secrets/alertmanager-resend.sealedsecret.yaml)
    # at /etc/alertmanager/secrets/alertmanager-resend/api-key for SMTP auth.
    secrets:
      - alertmanager-resend
  config:
    global:
      resolve_timeout: 5m
      # Resend SMTP: username is the literal "resend"; the password is the API
      # key, read from the mounted secret file (never in this repo).
      smtp_smarthost: smtp.resend.com:587
      smtp_from: alerts@cartarch.com            # cartarch.com is a verified Resend domain
      smtp_auth_username: resend
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-resend/api-key
      smtp_require_tls: true
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h                        # re-send an unresolved alert at most every 4h
      receiver: email
      routes:
        # Watchdog is an always-firing heartbeat — discard it (chart default behavior).
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: email
        email_configs:
          - to: jason@vanfreckle.com
            send_resolved: true

# k3s embeds kube-controller-manager, kube-scheduler, and kube-proxy in the
# server process; they are not separately scrapeable, so the chart's default
# ServiceMonitors mark them "down" and fire KubeControllerManagerDown /
# KubeSchedulerDown / KubeProxyDown — false positives that would spam the new
# email receiver. Disable their component monitoring (k3s health is still
# covered by node-exporter, kubelet, and apiserver metrics).
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
