# Helm values for kube-prometheus-stack.
# Consumed by the `observability` ArgoCD Application via a $values multi-source ref.
# Repo path: k8s/observability/prometheus-stack/values.yaml
#
# The manually-installed release ran with NO values at all (`helm get values` -> null).
# This file deliberately sets only what was MISSING -- durable storage and a managed
# admin credential. Everything else stays at chart defaults; no added complexity.

prometheus:
  prometheusSpec:
    retention: 10d
    # Durable TSDB on Longhorn. The manual install used emptyDir, so metrics were
    # wiped on every pod restart (4x already). This is the actual latent fix --
    # without it, the redeploy would faithfully reproduce the original problem.
    #
    # Sizing (2026-05-27): the cluster's Longhorn nodes are small (~34G disks on
    # 40G VMs) and near full -- a 20Gi x2-replica volume could not be scheduled.
    # 8Gi is generous for 10d of 4-node metrics; 1 replica is the honest count
    # for a non-backed-up, re-scrapeable monitoring TSDB. The replica-count
    # annotation is a PER-VOLUME Longhorn override -- it does NOT change the
    # cluster-wide `longhorn` StorageClass default for other apps.
    # Revisit once the VM disks are expanded (separate roadmap item); Longhorn
    # supports online volume expansion, so 8Gi can be grown later in place.
    storageSpec:
      volumeClaimTemplate:
        metadata:
          annotations:
            longhorn.io/replica-count: "1"
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 8Gi

grafana:
  # Durable Grafana DB (dashboards, prefs, users) on Longhorn -- also emptyDir before.
  persistence:
    enabled: true
    type: pvc
    storageClassName: longhorn
    accessModes: ["ReadWriteOnce"]
    size: 5Gi
  # Admin credential read from a cluster-side Secret that is NOT committed to Git.
  # Create it once (see docs/recovery.md); the password value never enters the repo.
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

# Alertmanager is left on the chart-default emptyDir deliberately -- persisted
# silences are low-value for a homelab. Add a storageSpec later if that changes.
