apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recurring-jobs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/mana-archive-platform
    targetRevision: main
    path: k8s/apps/recurring-jobs/overlays/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
