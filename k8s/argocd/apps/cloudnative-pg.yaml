# Repo path: k8s/argocd/apps/cloudnative-pg.yaml
#
# ArgoCD Application for the CloudNativePG OPERATOR (controller + CRDs) — the
# first half of the v4 Postgres bring-up. The actual database lives in a
# separate Application (cartarch-postgres.yaml) that depends on the CRDs this
# one installs.
#
# Layout rationale (mirrors observability.yaml / sealed-secrets.yaml):
#   - This manifest lives in k8s/argocd/apps/ because platform-root is a
#     NON-RECURSIVE Directory source over that path.
#   - Helm chart install, same shape as the sealed-secrets controller App.
#   - ServerSideApply=true is REQUIRED — the CNPG CRDs exceed the client-side
#     apply annotation size limit (same reason observability sets it).
#   - sync-wave "0": platform-root applies this BEFORE cartarch-postgres
#     (wave "1") so the Cluster CRD exists before the Cluster CR is synced.
#
# VERIFY before first sync: pin targetRevision to the current stable chart
# version (`helm search repo cnpg/cloudnative-pg --versions | head`). The value
# below is a recent-stable placeholder; treat it like observability's explicit
# pin rather than a floating range.
#
# Committing this file is what creates the Application — platform-root adopts
# it on next sync. Do not `kubectl apply` it by hand.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"         # after cert-manager (-2), before plugin (0) + cluster (1)
  finalizers:
    - resources-finalizer.argocd.argoproj.io   # cascade delete, consistent with other Apps
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: "0.28.2"                    # operator 1.29.1 (verified current stable 2026-06-01)
    helm:
      releaseName: cloudnative-pg
      values: |
        # Small homelab footprint for the single operator pod.
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            cpu: 200m
            memory: 256Mi
        # Surface operator metrics to the existing kube-prometheus-stack.
        # NOTE: the ServiceMonitor must carry label `release: kube-prometheus-stack`
        # to be scraped (see vanfreckle current-status Observability note).
        monitoring:
          podMonitorEnabled: false
          serviceMonitorEnabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
