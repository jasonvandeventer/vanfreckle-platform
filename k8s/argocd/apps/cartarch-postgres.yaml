# Repo path: k8s/argocd/apps/cartarch-postgres.yaml
#
# ArgoCD Application for the cartarch PostgreSQL CLUSTER — the second half of
# the v4 Postgres bring-up. Depends on the CRDs installed by the cloudnative-pg
# operator Application (sync-wave "0"); this one is wave "1".
#
# Layout rationale:
#   - Application manifest in k8s/argocd/apps/ (non-recursive platform-root path).
#   - Workload manifests under k8s/apps/cartarch-postgres/overlays/homelab,
#     mirroring the recurring-jobs / mana-archive base+overlay layout.
#   - Lands in the NEW `cartarch` namespace (the v4 rename target). The DB is
#     brand-new infra with no legacy name to preserve, so it is named forward
#     from day one. The live app stays in `mana-archive` until the v4 cutover,
#     at which point the web/worker Deployments move into `cartarch` and read
#     the in-namespace `cartarch-pg-app` secret CNPG generates (no cross-ns
#     secret copy). DECISION POINT — see docs/runbooks/cnpg-bring-up.md.
#
# Committing this file is what creates the Application — platform-root adopts
# it on next sync. Do not `kubectl apply` it by hand.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cartarch-postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"          # after the operator/CRDs (wave "0")
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/vanfreckle-platform
    targetRevision: main
    path: k8s/apps/cartarch-postgres/overlays/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: cartarch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:                                       # tolerate the brief window where
      limit: 5                                   # CRDs aren't registered yet on a
      backoff:                                   # cold cluster bring-up
        duration: 15s
        factor: 2
        maxDuration: 3m
