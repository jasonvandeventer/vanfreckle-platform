# Repo path: k8s/argocd/apps/platform-secrets.yaml
#
# ArgoCD Application that reconciles standalone SealedSecret manifests that do
# NOT belong to a single app's kustomize base — i.e. platform/bootstrap-tier
# secrets that previously existed only as hand-applied Kubernetes Secrets.
#
# Why this exists:
#   - Helm-based Applications (observability, image-updater) cannot carry a raw
#     SealedSecret manifest, so their secrets had nowhere to be reconciled from.
#   - The image-updater git-creds SealedSecret was committed but sat in no sync
#     path at all (recon finding C1) — it worked only because the underlying
#     Secret had been hand-applied, which is rebuild-fragile.
#   This Application is the GitOps home for both.
#
# Layout rationale (mirrors observability.yaml):
#   - This manifest lives in k8s/argocd/apps/ because platform-root is a
#     NON-RECURSIVE Directory source over that path.
#   - It points at k8s/secrets/, a flat directory of *.sealedsecret.yaml files.
#     Each SealedSecret declares its own target namespace (observability,
#     argocd, ...), so this single Application spans namespaces — permitted
#     because the `default` AppProject allows destination namespace '*'.
#   - destination.namespace below is only the fallback for resources that omit
#     a namespace; every manifest here sets one explicitly, so nothing actually
#     lands in the fallback.
#
# One-time adoption: each secret here pre-dates Sealed Secrets and exists as an
# unmanaged hand-created Secret. Before first sync, annotate each live Secret
# `sealedsecrets.bitnami.com/managed=true` (see each manifest's header) so the
# controller adopts it in place instead of erroring on a conflict. Because the
# sealed values were captured from the live Secrets, adoption changes no
# credential and triggers no workload restart.
#
# Committing this file is what creates the Application — platform-root adopts
# it on next sync. Do not `kubectl apply` it by hand.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io   # cascade delete, consistent with other Apps
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/vanfreckle-platform.git
    targetRevision: main
    path: k8s/secrets
    directory:
      recurse: false
      include: '*.sealedsecret.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd                           # fallback only — see header
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
