# Repo path: k8s/argocd/apps/barman-cloud-plugin.yaml
#
# The CloudNativePG Barman Cloud Plugin — the supported backup/WAL-archiving
# path on CNPG operator >= 1.26 (the in-tree .spec.backup.barmanObjectStore was
# removed; confirmed absent from the 0.28.2 chart CRD). Runs as a deployment in
# cnpg-system plus per-instance sidecars injected into the Postgres pods; it
# owns the ObjectStore CRD that k8s/apps/cartarch-postgres/base/objectstore.yaml
# uses.
#
# Install model — VENDORED manifest, pinned to a release:
#   The plugin ships a single release manifest (CRDs + RBAC + deployment +
#   cert-manager Certificates), NOT a Helm chart. We vendor it into the repo so
#   the version is pinned, reviewable, and GitOps-applied (do not `kubectl apply`
#   the upstream URL out of band). To bootstrap or bump:
#     curl -fsSL -o k8s/apps/barman-cloud-plugin/manifest.yaml \
#       https://github.com/cloudnative-pg/plugin-barman-cloud/releases/download/v0.12.0/manifest.yaml
#   then commit. See k8s/apps/barman-cloud-plugin/README.md.
#
# Depends on: cert-manager (wave -2, its Certificates) + the CNPG operator
# (wave -1). This App is wave "0"; the cluster (which references the plugin) is
# wave "1".
#
# ServerSideApply=true — the bundled CRD exceeds the client-side apply limit
# (same reason as the operator/observability Apps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: barman-cloud-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/vanfreckle-platform
    targetRevision: main
    path: k8s/apps/barman-cloud-plugin
    directory:
      recurse: false
      include: 'manifest.yaml'                  # the vendored release manifest only
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system                      # plugin must share the operator's namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
