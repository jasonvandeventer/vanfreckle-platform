apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: mana-archive-updater
  namespace: argocd
spec:
  namespace: argocd

  writeBackConfig:
    method: "git:secret:argocd/image-updater-git-creds"
    gitConfig:
      branch: "main"

  applicationRefs:
    # Auto-updates re-enabled after the CSRF incident (2026-05-31) — cartarch
    # v3.31.2 fixes the "Invalid CSRF token" sign-in failure, so tracking the
    # latest semver tag is safe again. NB: the incident's `images: []` "disable"
    # did NOT actually stop the updater (it re-bumped the pin onto 3.31.x twice),
    # so don't rely on emptying this list to halt updates — the live updater
    # config may not be syncing from this path. See the note in
    # overlays/homelab/.argocd-source-mana-archive.yaml.
    - namePattern: "mana-archive"
      images:
        - alias: "manaarchive"
          imageName: "ghcr.io/jasonvandeventer/mana-archive"
          commonUpdateSettings:
            updateStrategy: "semver"
          manifestTargets:
            kustomize:
              name: "ghcr.io/jasonvandeventer/mana-archive"
