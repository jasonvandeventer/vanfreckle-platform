# Repo path: k8s/secrets/r2-backup-credential.sealedsecret.yaml
#
# Cloudflare R2 (S3-compatible) credentials for the Longhorn off-site backup
# target. Longhorn reads these exact keys from the Secret named in the
# BackupTarget's credentialSecret:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — R2 API token (Object R/W on
#     the cartarch-backups bucket)
#   AWS_ENDPOINTS — the R2 S3 endpoint (https://<account>.r2.cloudflarestorage.com)
# Sealed 2026-05-30 from an R2 API token; plaintext never enters Git.
# Consumed by the BackupTarget at k8s/apps/recurring-jobs/base/backup-target.yaml.
# Reconciled by the `platform-secrets` ArgoCD Application.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: r2-backup-credential
  namespace: longhorn-system
spec:
  encryptedData:
    AWS_ACCESS_KEY_ID: 
    AWS_ENDPOINTS: 
    AWS_SECRET_ACCESS_KEY: 
  template:
    metadata:
      creationTimestamp: null
      name: r2-backup-credential
      namespace: longhorn-system
