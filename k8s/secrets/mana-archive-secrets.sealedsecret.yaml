# Repo path: k8s/secrets/mana-archive-secrets.sealedsecret.yaml
#
# Sealed copy of the application Secret consumed by the mana-archive (Cartarch)
# Deployment — RESEND_API_KEY (transactional email) and SESSION_SECRET_KEY
# (session signing). Referenced at k8s/apps/mana-archive/base/deployment.yaml.
#
# Provenance: sealed 2026-05-29 from the live, previously hand-created
# `mana-archive-secrets` Secret (referenced by the Deployment but never defined
# in Git). Encrypted values match what the app is already running with — no
# secret change, no pod restart on adoption.
#
# Migration note (one-time): the live Secret pre-dates Sealed Secrets and is not
# yet owned by a SealedSecret. It has been annotated so the controller may adopt
# it in place instead of erroring on a conflicting unmanaged Secret:
#
#   kubectl -n mana-archive annotate secret mana-archive-secrets \
#     sealedsecrets.bitnami.com/managed=true
#
# Reconciled by the `platform-secrets` ArgoCD Application
# (k8s/argocd/apps/platform-secrets.yaml).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: mana-archive-secrets
  namespace: mana-archive
spec:
  encryptedData:
    RESEND_API_KEY: 
    SESSION_SECRET_KEY: 
  template:
    metadata:
      creationTimestamp: null
      name: mana-archive-secrets
      namespace: mana-archive
    type: Opaque
