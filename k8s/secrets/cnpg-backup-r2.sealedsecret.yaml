# Repo path: k8s/secrets/cnpg-backup-r2.sealedsecret.yaml
#
# Cloudflare R2 (S3-compatible) credentials for the CloudNativePG Barman Cloud
# Plugin backups. The plugin's ObjectStore CR
# (k8s/apps/cartarch-postgres/base/objectstore.yaml) reads these exact keys from
# the Secret named in spec.configuration.s3Credentials:
#   ACCESS_KEY_ID / SECRET_ACCESS_KEY — R2 API token (Object R/W on cartarch-backups)
# Sealed for namespace `cartarch` (the cluster's namespace — SealedSecrets are
# sealed per namespace+name, so this cannot reuse the longhorn-system
# r2-backup-credential). Reuses the SAME R2 token as the Longhorn BackupTarget;
# plaintext never enters Git. Reconciled by the `platform-secrets` ArgoCD App.
# Bring-up: docs/runbooks/cnpg-bring-up.md (step 2).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: cnpg-backup-r2
  namespace: cartarch
spec:
  encryptedData:
    ACCESS_KEY_ID: 
    SECRET_ACCESS_KEY: 
  template:
    metadata:
      creationTimestamp: null
      name: cnpg-backup-r2
      namespace: cartarch
