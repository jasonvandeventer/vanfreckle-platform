# Repo path: k8s/secrets/grafana-admin-credentials.sealedsecret.yaml
#
# Sealed copy of the Grafana admin credential Secret consumed by the
# kube-prometheus-stack Grafana deployment (observability namespace).
#
# Provenance: sealed 2026-05-29 from the live, previously hand-created
# `grafana-admin-credentials` Secret (`kubectl get secret ... | kubeseal`),
# so the encrypted values match what Grafana is already running with — no
# credential change, no Grafana restart on adoption.
#
# Migration note (one-time): the live Secret pre-dates Sealed Secrets and is
# not yet owned by a SealedSecret. Before this reconciles, annotate the
# existing Secret so the controller is allowed to adopt it instead of erroring
# on a conflicting unmanaged Secret:
#
#   kubectl -n observability annotate secret grafana-admin-credentials \
#     sealedsecrets.bitnami.com/managed=true
#
# Reconciled by the `platform-secrets` ArgoCD Application
# (k8s/argocd/apps/platform-secrets.yaml).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: grafana-admin-credentials
  namespace: observability
spec:
  encryptedData:
    admin-password: 
    admin-user: 
  template:
    metadata:
      creationTimestamp: null
      name: grafana-admin-credentials
      namespace: observability
    type: Opaque
