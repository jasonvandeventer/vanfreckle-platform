# Repo path: k8s/secrets/alertmanager-resend.sealedsecret.yaml
#
# Resend API key for Alertmanager's SMTP auth (email receiver). Resend SMTP uses
# the API key as the password (username "resend"). Sealed 2026-05-30 from the
# live RESEND_API_KEY (same value the app uses); a copy is needed in the
# observability namespace because Alertmanager runs there, separate from the
# app's mana-archive-secrets.
#
# Consumed by the observability Helm values via
# alertmanager.alertmanagerSpec.secrets: [alertmanager-resend], mounted at
# /etc/alertmanager/secrets/alertmanager-resend/api-key and referenced as
# smtp_auth_password_file. Reconciled by the `platform-secrets` Application.
# This is a NEW secret (no pre-existing unmanaged Secret to adopt).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: alertmanager-resend
  namespace: observability
spec:
  encryptedData:
    api-key: 
  template:
    metadata:
      creationTimestamp: null
      name: alertmanager-resend
      namespace: observability
