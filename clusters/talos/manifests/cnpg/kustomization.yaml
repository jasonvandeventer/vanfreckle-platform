# CloudNativePG OPERATOR install — pinned 1.29.1 (HARD floor: CVE-2026-44477).
# This is the upstream operator/controller manifest ONLY. It creates the cnpg-system
# namespace, the CRDs (Cluster, Pooler, ScheduledBackup, …), RBAC, and the controller
# Deployment. It does NOT create any database.
#
# 🛑 NO Cluster CR / database here — that is authored later, gated behind the v4
#    migration stop-point (build guide Phase 9). See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.29/releases/cnpg-1.29.1.yaml
