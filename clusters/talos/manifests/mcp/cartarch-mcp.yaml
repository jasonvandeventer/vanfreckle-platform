# cartarch-mcp on green/Talos — moved from blue/k3s. Env updated for green: the app now
# lives in cnpg-system (not mana-archive), reached same-cluster via its ClusterIP service.
# Exposed via NodePort (no ingress controller on green). The ServiceAccount lives here in
# mcp; its log-reader Role/RoleBinding live in cnpg-system (see cartarch-mcp-rbac.yaml).
#
# The blue `cartarch-mcp-secrets` SealedSecret is NOT replicated — verified UNUSED: the
# deployment sets every env via plain `value:`, never secretKeyRef/envFrom.
# Image pinned v0.1.0 — no argocd-image-updater wiring for the MCPs on green (blue used
# annotation-based auto-update; add an ImageUpdater CR later if auto-bump is wanted).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cartarch-mcp
  namespace: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartarch-mcp
  namespace: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartarch-mcp
  template:
    metadata:
      labels:
        app: cartarch-mcp
    spec:
      serviceAccountName: cartarch-mcp
      containers:
        - name: cartarch-mcp
          image: ghcr.io/jasonvandeventer/cartarch-mcp:v0.1.0
          ports:
            - containerPort: 8000
          env:
            - name: CARTARCH_ENV
              value: prod
            # green's internal app service (same cluster now — no NodePort hop)
            - name: CARTARCH_PROD_API_URL
              value: http://mana-archive.cnpg-system.svc.cluster.local:80
            - name: CARTARCH_DEV_API_URL
              value: http://10.42.1.20:8000 # Nobara, unchanged
            - name: CARTARCH_ENABLE_MUTATIONS
              value: "false"
            - name: CARTARCH_POD_NAMESPACE
              value: cnpg-system # the app now lives here
            - name: CARTARCH_POD_LABEL
              value: app=mana-archive
            # Kept even though no PVC is mounted — the code handles file-not-found gracefully.
            - name: CARTARCH_DB_PATH
              value: /data/cartarch.db
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cartarch-mcp
  namespace: mcp
spec:
  type: NodePort
  selector:
    app: cartarch-mcp
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30082 # cloudflared (Unraid) -> http://<node>:30082
