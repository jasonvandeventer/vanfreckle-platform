apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NO blanket `namespace:` here — these resources deliberately span namespaces:
#   mcp (Namespace, SA, both Deployments + Services, the PVC), cnpg-system (the
#   cartarch-mcp log-reader Role + RoleBinding), and cluster-scoped (the NFS PV).
# Each manifest sets its own namespace; a blanket namespace would wrongly force the
# cnpg-system RBAC + the cluster-scoped objects into mcp.
resources:
  - namespace.yaml
  - obsidian-mcp.yaml
  - cartarch-mcp.yaml
  - cartarch-mcp-rbac.yaml
  - github-mcp.yaml
  - github-mcp-sealedsecret.yaml
