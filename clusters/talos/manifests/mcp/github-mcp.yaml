# github-mcp on green/Talos — self-hosted github/github-mcp-server (streamable-HTTP mode).
# Gives Claude.ai in-conversation issue/PR filing + triage on jasonvandeventer/cartarch.
# Exposed via NodePort (no ingress controller on green); cloudflared (Unraid) fronts it.
# The server serves MCP at path /mcp on its port, so the internal endpoint is
# http://<node>:30083/mcp.
#
# SIMPLER than cartarch-mcp: NO ServiceAccount / RBAC — github-mcp talks to GitHub's API,
# not the k8s API, so it needs neither. Auth is the GITHUB_PERSONAL_ACCESS_TOKEN env,
# sourced from the github-mcp-secrets SealedSecret (key github-pat) in this same dir.
# Image pinned v1.2.0 — no argocd-image-updater wiring for the MCPs on green.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp
  namespace: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp
  template:
    metadata:
      labels:
        app: github-mcp
    spec:
      containers:
        - name: github-mcp
          image: ghcr.io/github/github-mcp-server:v1.2.0
          command: ["github-mcp-server"]
          args: ["http", "--port", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-mcp-secrets
                  key: github-pat
            - name: GITHUB_TOOLSETS
              value: "issues,pull_requests,context"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp
  namespace: mcp
spec:
  type: NodePort
  selector:
    app: github-mcp
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30083 # cloudflared (Unraid) -> http://<node>:30083/mcp
