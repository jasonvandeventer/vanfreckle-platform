# Discord intake bot — a headless Discord gateway client (NO Service: outbound
# only, no inbound traffic). Single replica with a Recreate strategy because it is
# the sole writer of a SQLite DB on an RWO volume (two pods must never share it).
# Image must be built + pushed to GHCR first (see README); pinned v0.1.0.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: discord-intake-data
  namespace: intake
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-ssd
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-intake
  namespace: intake
spec:
  replicas: 1
  strategy:
    type: Recreate # single SQLite writer on an RWO volume — no rolling overlap
  selector:
    matchLabels:
      app: discord-intake
  template:
    metadata:
      labels:
        app: discord-intake
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001 # group-own the PVC so uid 10001 can create the SQLite DB
      containers:
        - name: discord-intake
          image: ghcr.io/jasonvandeventer/discord-intake-bot:v0.1.4
          envFrom:
            - configMapRef:
                name: discord-intake-config
            - secretRef:
                name: discord-intake-secrets
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: discord-intake-data
