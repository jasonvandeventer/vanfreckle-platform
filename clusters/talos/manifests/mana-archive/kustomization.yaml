apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Green/Talos cartarch app. Now synced by clusters/talos/argocd/apps/mana-archive.yaml
# and under argocd-image-updater (semver) — the updater writes future tag bumps back to
# THIS `newTag`. The Phase C dry-run is done, so auto-bump is enabled.
#
# The app runs IN cnpg-system (co-located with the cartarch-prod CNPG cluster), so the
# CNPG app secret + the cartarch-prod-rw service resolve same-namespace. cnpg-system
# already exists on the cluster, so there is no namespace.yaml here.
#
# NOT included (see README + the parity gaps):
#   - Ingress       — green has no ingress controller; traffic comes via cloudflared.
#   - ServiceMonitor — green observability is deferred; re-add when kube-prometheus-stack lands.
#   - the secrets    — cartarch-prod-app (CNPG-generated, same ns) + mana-archive-secrets
#                      (SealedSecret applied into cnpg-system) are applied out-of-band.
resources:
  - deployment.yaml
  - service.yaml
  - migrate-job.yaml

# Pin v4.0.1 — the immediate deploy (overrides deployment.yaml's image tag). From here
# image-updater advances this newTag automatically as new semver tags ship to GHCR.
images:
  - name: ghcr.io/jasonvandeventer/mana-archive
    newTag: v4.1.3
