# PreSync migration Job for the DEV app — mirrors prod's ../cartarch/migrate-job.yaml.
# Runs `alembic upgrade head` against the dev DB BEFORE the dev app rolls, so the dev
# image is exercised migrated (Phase B exit criterion 2). DATABASE_URL is recomposed in
# the entrypoint shell — a bare Job does NOT inherit the app's env (Operational
# reference) — from the same managed-role secret the deployment uses.
apiVersion: batch/v1
kind: Job
metadata:
  name: cartarch-dev-migrate
  namespace: cartarch-dev
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/jasonvandeventer/cartarch:main
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-ec"]
          args:
            - |
              export DATABASE_URL="$(python -c 'import os,urllib.parse as u; print("postgresql+psycopg://%s:%s@cartarch-dev-rw.cartarch-dev.svc.cluster.local:5432/cartarch" % (u.quote(os.environ["PGUSER"],safe=""), u.quote(os.environ["PGPASSWORD"],safe="")))')"
              alembic upgrade head
              alembic current
          env:
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: cartarch-dev-app-role, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: cartarch-dev-app-role, key: password } }
            - name: DATA_DIR
              value: /tmp
