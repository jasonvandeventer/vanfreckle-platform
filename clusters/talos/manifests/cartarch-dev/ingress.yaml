# Tailscale ingress for the dev app (Phase B deferred item, completed 2026-07-04).
# ingressClassName: tailscale hands this to the Tailscale operator, which provisions a
# tailnet node and proxies HTTPS to the cartarch-dev Service. tls.hosts[0] becomes the
# MagicDNS name: cartarch-dev -> https://cartarch-dev.dhole-tailor.ts.net (Let's Encrypt
# cert auto-provisioned; tailnet has MagicDNS + HTTPS enabled). Reachable only from
# devices on Jason's tailnet — replaces the ClusterIP + port-forward access path.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cartarch-dev
  namespace: cartarch-dev
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - cartarch-dev
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cartarch-dev
                port:
                  number: 80
