apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cartarch DEV app (Phase B). Synced by clusters/talos/argocd/apps/mana-archive-dev.yaml
# into the cartarch-dev namespace (co-located with the dev CNPG cluster). The dev
# image-updater (argocd/image-updaters/mana-archive-dev.yaml) tracks the `main` tag by
# DIGEST and writes .argocd-source-mana-archive-dev.yaml here — so `newTag: main` below
# is the base pin, the digest override rides on top.
namespace: cartarch-dev
resources:
  - mana-archive-dev-secrets.sealedsecret.yaml
  - deployment.yaml
  - service.yaml
  - migrate-job.yaml
  - ingress.yaml

images:
  - name: ghcr.io/jasonvandeventer/mana-archive
    newTag: main
