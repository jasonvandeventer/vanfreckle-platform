apiVersion: v1
kind: ConfigMap
metadata:
  name: cartarch-dev-sanitize-sql
  namespace: cartarch-dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
data:
  sanitize.sql: |
    UPDATE users SET password_hash = '$argon2id$v=19$m=65536,t=3,p=4$qRs2Ufu4RAbNI7Z4MABH6w$ub2kHmLF+xZ+MIunajLTfxLp1Knq3xiqzxHIOtjgXYE';
    UPDATE users SET
      username = 'devuser_' || id,
      display_name = CASE WHEN display_name IS NULL THEN NULL ELSE 'Dev User ' || id END;
    UPDATE users SET username = 'devadmin', is_admin = true
      WHERE id = (SELECT MIN(id) FROM users);
    DELETE FROM password_reset_tokens;
    UPDATE users SET last_signed_in_at = NULL, last_active_at = NULL;
    -- Denormalized identity snapshots (added 2026-07-04 after a schema audit: the block
    -- above sanitized `users` ONLY, but real player names and username snapshots also live
    -- on game_seats/games/trades, and playgroups carry a user-chosen group name. This
    -- schema has NO email column — login and password-reset are username-keyed (main.py
    -- looks the "email" form field up against users.username) — so there is nothing
    -- email-shaped to scramble. id-derived + deterministic so it stays rehydrate-stable.
    UPDATE game_seats SET
      player_name       = 'devuser_' || COALESCE(user_id::text, 'seat' || id),
      user_name_at_game = CASE WHEN user_name_at_game IS NULL THEN NULL
                               ELSE 'devuser_' || COALESCE(user_id::text, 'seat' || id) END;
    UPDATE games SET user_name_at_game = 'devuser_' || user_id
      WHERE user_name_at_game IS NOT NULL;
    UPDATE trades SET
      proposer_name_at_trade  = CASE WHEN proposer_name_at_trade  IS NULL THEN NULL ELSE 'devuser_' || proposer_user_id  END,
      recipient_name_at_trade = CASE WHEN recipient_name_at_trade IS NULL THEN NULL ELSE 'devuser_' || recipient_user_id END;
    UPDATE playgroups SET name = 'Dev Playgroup ' || id;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cartarch-dev-sanitize
  namespace: cartarch-dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: sanitize
          image: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              # Guard: refuse to run against anything but the dev cluster host.
              if [[ "${PGHOST}" != cartarch-dev-rw* ]]; then
                echo "REFUSING: PGHOST=${PGHOST} is not the dev cluster. Sanitize aborted."
                exit 1
              fi
              psql -v ON_ERROR_STOP=1 -f /sql/sanitize.sql
              echo "Sanitization complete."
          env:
            - name: PGHOST
              value: cartarch-dev-rw
            - name: PGDATABASE
              value: cartarch
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: cartarch-dev-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cartarch-dev-superuser
                  key: password
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: cartarch-dev-sanitize-sql
