apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  labels:
    # The operator and its per-Ingress proxy pods run tailscaled, which needs
    # NET_ADMIN. Talos enforces Pod Security; label privileged like longhorn-system
    # so the proxies aren't blocked if enforce is ever tightened from warn.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
