# ImageUpdater CR for the cartarch app on GREEN/Talos.
#
# RESTORED 2026-06-25 (issue #31 / v4.0.16 release). The previous CR of this name
# was applied to green IMPERATIVELY (never in the green GitOps tree) and was
# deleted 2026-06-23 ~16:26 UTC; nothing recreated it, so auto-deploy silently
# stopped and v4.0.12–v4.0.15 were shipped via MANUAL `newTag` commits. This file
# puts the CR under GitOps at the path the green controller app already documents
# (clusters/talos/argocd/apps/image-updater.yaml: "the CRD is what
# clusters/talos/argocd/image-updaters/cartarch.yaml depends on … sync-wave 7"),
# so it survives. Config copied verbatim from the proven blue version
# (k8s/argocd/image-updaters/mana-archive.yaml) — it is cluster-agnostic.
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: cartarch-updater
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/image-updater-git-creds"
    gitConfig:
      branch: "main"

  applicationRefs:
    - namePattern: "cartarch"
      images:
        - alias: "cartarch"
          imageName: "ghcr.io/jasonvandeventer/cartarch"
          commonUpdateSettings:
            updateStrategy: "semver"
          manifestTargets:
            kustomize:
              name: "ghcr.io/jasonvandeventer/cartarch"
