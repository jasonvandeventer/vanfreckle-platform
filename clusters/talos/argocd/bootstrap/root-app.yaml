# Root app-of-apps for the Talos cluster.
# ─────────────────────────────────────────────────────────────────────────────
# Bootstrap complete: root now auto-syncs (`automated: {prune, selfHeal}`) so a
# change under clusters/talos/argocd/apps/ (adding, editing, or removing a child
# Application) reconciles on its own instead of sitting OutOfSync until a manual
# `argocd app sync root`. Child Applications still opt into their own automation
# individually. The manual-only posture was intentional ONLY for the initial
# stand-up (enable automation after the first manual sync is verified) — that gate
# has passed.
#
# Cluster-aware overlay: this path (clusters/talos/**) is SEPARATE from the old
# k3s cluster's k8s/** tree, so the two ArgoCD instances never reconcile each
# other's desired state (build guide Phase 8 + pitfall list).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/vanfreckle-platform.git
    targetRevision: main        # 🅵 until this branch merges, point at feature/talos-cluster-bootstrap to test
    path: clusters/talos/argocd/apps
  destination:
    server: https://kubernetes.default.svc   # the NEW cluster's own API (does not exist yet)
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
