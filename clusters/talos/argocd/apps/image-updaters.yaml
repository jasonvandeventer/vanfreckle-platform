# Green/Talos ImageUpdater CRs — ArgoCD Application (app-of-apps child).
#
# Syncs clusters/talos/argocd/image-updaters/ (the ImageUpdater CRs) into the
# argocd namespace. sync-wave 7 so it lands AFTER the image-updater controller +
# CRD (image-updater.yaml, wave 5). This app was MISSING on green: the controller
# app's own comment references clusters/talos/argocd/image-updaters/mana-archive.yaml
# "sync-wave 7", but no app ever synced that path, so the mana-archive ImageUpdater
# CR was hand-applied and a 2026-06-23 manual delete silently killed auto-deploy
# (v4.0.12–v4.0.15 then shipped via manual newTag commits). This app closes that gap.
#
# automated sync (like image-updater.yaml / mana-archive.yaml) — required so the CR
# is recreated if deleted. NOTE: the root app-of-apps is manual-sync, so this child
# is created on the next `argocd app sync` of root.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-updaters
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/vanfreckle-platform.git
    targetRevision: main
    path: clusters/talos/argocd/image-updaters
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
