# Green/Talos argocd-image-updater — installs the controller + the ImageUpdater CRD
# (the CRD is what clusters/talos/argocd/image-updaters/mana-archive.yaml depends on, so
# this app must sync BEFORE the CR — sync-wave 5 < 7). Mirrors blue's
# k8s/argocd/apps/image-updater.yaml: the argo-helm chart, pinned 1.2.2, with the SAME
# shared values file (k8s/argocd/image-updater/values.yaml — verified cluster-agnostic:
# argocd-server.argocd.svc resolves on green too, so no green-specific values needed).
#
# ⚠ automated sync diverges from green's manual-first convention (see mana-archive.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-updater
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argocd-image-updater
      targetRevision: 1.2.2
      helm:
        releaseName: argocd-image-updater
        valueFiles:
          - $values/k8s/argocd/image-updater/values.yaml
    - repoURL: https://github.com/jasonvandeventer/vanfreckle-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
