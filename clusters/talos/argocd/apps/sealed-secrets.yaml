# Sealed Secrets controller — MIRRORS the old k3s cluster's app (k8s/argocd/apps/
# sealed-secrets.yaml): same chart version (2.18.6), fullnameOverride, and namespace,
# so the REUSED master key (restored before this syncs) is found and used unchanged.
# 🛑 Restore the key into the `sealed-secrets` namespace first — see SEALED-SECRETS-KEY-REUSE.md.
# 🛑 Do NOT generate a new key — every committed SealedSecret would fail to decrypt.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.18.6
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets-controller
        namespace: sealed-secrets
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits:   { cpu: 200m, memory: 256Mi }
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  # manual sync — no automated block (see root-app.yaml)
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
