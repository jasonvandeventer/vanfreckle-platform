# app-of-apps target — the `root` Application (../bootstrap/root-app.yaml) syncs this
# directory. It contains ONLY child Application CRs (no workload manifests); each app
# points at a Helm chart or at clusters/talos/manifests/**.
#
# Deferred (NOT in this skeleton, by scope): observability (kube-prometheus-stack +
# Loki — build as its own focused session per guide Phase 8), cloudflared side-door
# tunnel. (Image Updater + the Cartarch app are now wired in below.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - namespaces.yaml
  - sealed-secrets.yaml
  - longhorn.yaml
  - longhorn-config.yaml
  - cnpg-operator.yaml
  - cert-manager-crds.yaml
  - cert-manager.yaml
  - cnpg-barman-plugin.yaml
  - cnpg-crds.yaml
  - cnpg-backup-config.yaml
  - cnpg-cartarch-prod.yaml
  # cartarch app auto-deploy wiring (sync-waves 5→6→7):
  - image-updater.yaml # the controller + ImageUpdater CRD
  - mana-archive.yaml # the app Deployment + Service (cnpg-system)
  - image-updater-crs.yaml # the ImageUpdater CR watching the app

