apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"      # CRDs before the operator that watches them
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/vanfreckle-platform.git
    targetRevision: main
    path: clusters/talos/manifests/cnpg-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    syncOptions:
      - Replace=true                        # oversized CRDs — in-place replace; SSA delete-recreate can time out and lose the CRD (2026-06-18 incident)
