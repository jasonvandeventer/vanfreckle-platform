apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/jasonvandeventer/vanfreckle-platform.git
    targetRevision: main
    path: clusters/talos/manifests/cnpg-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true               # Argo runs `kubectl apply --server-side --force-conflicts` (the proven restore cmd) — no last-applied annotation (dodges 256KiB), no delete-recreate. NOT Replace: bug #7131, Replace re-triggers annotation + delete-recreate → deleted clusters/poolers twice 2026-06-18.
      - SkipDryRunOnMissingResource=true
